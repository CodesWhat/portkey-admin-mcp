name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing v* tag to publish as a GitHub Release"
        required: true
        type: string

permissions:
  contents: write

jobs:
  github-release:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          EVENT_NAME: ${{ github.event_name }}
          INPUT_TAG: ${{ github.event.inputs.tag }}
        run: |
          set -euo pipefail

          tag="${GITHUB_REF_NAME}"
          if [[ "$EVENT_NAME" == "workflow_dispatch" ]]; then
            tag="$INPUT_TAG"
          fi

          if [[ ! "$tag" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$ ]]; then
            echo "Refusing to publish non-semver tag: $tag" >&2
            exit 1
          fi

          git fetch --tags --force
          if ! git rev-parse -q --verify "refs/tags/$tag" >/dev/null; then
            echo "Tag does not exist on the remote: $tag" >&2
            exit 1
          fi

          if gh release view "$tag" >/dev/null 2>&1; then
            echo "GitHub Release already exists for $tag; nothing to do."
            exit 0
          fi

          args=(--verify-tag --generate-notes --title "Release $tag")
          if [[ "$tag" == *-* ]]; then
            args+=(--prerelease --latest=false)
          else
            args+=(--latest)
          fi

          gh release create "$tag" "${args[@]}"
